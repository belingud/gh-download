name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            archive: tar.gz
            use-cross: true
          - os: ubuntu-24.04
            target: aarch64-unknown-linux-musl
            archive: tar.gz
            use-cross: true
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
            use-cross: false
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
            use-cross: false
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            archive: zip
            use-cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --target "${{ matrix.target }}"
          else
            cargo build --release --target "${{ matrix.target }}"
          fi

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          PACKAGE_NAME="gh-download-${VERSION}-${{ matrix.target }}"
          mkdir -p "dist/${PACKAGE_NAME}"
          cp "target/${{ matrix.target }}/release/gh-download" "dist/${PACKAGE_NAME}/"
          cp README.md LICENSE "dist/${PACKAGE_NAME}/"
          tar -C dist -czf "dist/${PACKAGE_NAME}.tar.gz" "${PACKAGE_NAME}"

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $Version = $env:GITHUB_REF_NAME
          $PackageName = "gh-download-$Version-${{ matrix.target }}"
          New-Item -ItemType Directory -Path "dist/$PackageName" -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/gh-download.exe" "dist/$PackageName/"
          Copy-Item README.md "dist/$PackageName/"
          Copy-Item LICENSE "dist/$PackageName/"
          Compress-Archive -Path "dist/$PackageName" -DestinationPath "dist/$PackageName.zip" -Force

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  release:
    name: publish-release
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
