      <circle cx="54" cy="66" r="6" fill="#7CDFFF"/>
      <circle cx="82" cy="66" r="6" fill="#FFCB7E"/>
      <text x="120" y="74" class="small">只下载部分文件</text>
      <text x="52" y="116" class="mono">gh-download owner/repo path ./target</text>
    </g>
  </g>

