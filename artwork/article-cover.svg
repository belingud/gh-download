      .title {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
        fill: #F5FBFF;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      .subtitle {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
        fill: #B9D3E9;
        font-weight: 400;
      }
      .label {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
        fill: #D7F2FF;
        font-size: 26px;
        font-weight: 600;
        letter-spacing: 0.08em;
      }
      .small {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
