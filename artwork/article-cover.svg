    <circle cx="34" cy="27" r="7" fill="#66D6FF"/>
    <text x="58" y="35" class="label">GITHUB PATH DOWNLOAD</text>

    <text x="0" y="184" class="title" font-size="128">
      <tspan x="0" dy="0">gh-download</tspan>
    </text>

    <text x="6" y="282" class="subtitle" font-size="40">GitHub 路径下载工具</text>

    <text x="4" y="418" class="subtitle" font-size="34">
      <tspan x="4" dy="0">按仓库路径下载文件或目录，省掉 zip、解压和手工整理。</tspan>
      <tspan x="4" dy="56">先判断目标类型，再把真正需要的那一部分直接写到本地。</tspan>
    </text>

    <g transform="translate(0 598)">
      <rect x="0" y="0" width="170" height="54" rx="27" fill="#123652" fill-opacity="0.9" stroke="#2EA7DE" stroke-opacity="0.38"/>
      <text x="30" y="35" class="tag">文件下载</text>
      <rect x="192" y="0" width="170" height="54" rx="27" fill="#123652" fill-opacity="0.82" stroke="#2EA7DE" stroke-opacity="0.28"/>
      <text x="222" y="35" class="tag">目录递归</text>
      <rect x="384" y="0" width="160" height="54" rx="27" fill="#123652" fill-opacity="0.78" stroke="#2EA7DE" stroke-opacity="0.24"/>
      <text x="420" y="35" class="tag">终端优先</text>
      <rect x="566" y="0" width="168" height="54" rx="27" fill="#123652" fill-opacity="0.72" stroke="#2EA7DE" stroke-opacity="0.2"/>
      <text x="602" y="35" class="tag">直接落盘</text>
    </g>

    <g transform="translate(0 720)">
